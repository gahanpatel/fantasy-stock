<!DOCTYPE html>
<html>
<head>
  <title>TamidTrades</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6fb;
      margin: 40px;
    }

    .summary-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background-color: white;
      border-radius: 12px;
      padding: 18px;
      width: 180px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .label {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .value {
      font-size: 22px;
      font-weight: bold;
      color: #1f2937;
      margin-bottom: 6px;
    }

    .subtext {
      font-size: 14px;
      color: #4b5563;
    }

    .green {
      color: #4f9f4f;
    }
  </style>
</head>
<body>
  <div class="summary-row">
    <div class="card">
      <div class="label">Portfolio Value</div>
      <div class="value">$127,800</div>
      <div class="subtext green">+27.8% all-time</div>
    </div>

    <div class="card">
      <div class="label">Today's Gain</div>
      <div class="value green">+$1,250</div>
      <div class="subtext green">+0.98% today</div>
    </div>

    <div class="card">
      <div class="label">Cash Balance</div>
      <div class="value">$18,420</div>
      <div class="subtext">Available buying power</div>
    </div>

    <div class="card">
      <div class="label">Sharpe Ratio</div>
      <div class="value">1.42</div>
      <div class="subtext">Risk-adjusted performance</div>
    </div>
  </div>
</body>
</html>
